name: 功能请求
description: |
  为BiliPai提出新功能。
labels: feature request
body:
- type: markdown
  attributes:
    value: |
      提交前，请务必检查问题列表中的重复项！
- type: checkboxes
  id: checks
  attributes:
    label: 在发布提问之前...
    options:
    - label: 我明白这是在提出请求而不是在许愿。
      required: true
- type: textarea
  id: "feature"
  attributes:
    label: 描述
    description: |
      详细描述你要添加的新功能。
  validations:
    required: true
- type: textarea
  id: "reason"
  attributes:
    label: 原因
    description: |
      描述此功能的好处及其原因。
  validations:
    required: true
<!-- 改自FCL的is模板，如有冒犯，还请原谅 -->
